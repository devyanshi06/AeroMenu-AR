<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AeroMenu Absolute Debug Suite</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <style>
        html, body {
            margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; background: #000;
        }
        a-scene {
            width: 100vw !important; height: 100vh !important; position: fixed !important; top: 0; left: 0; z-index: 1;
        }
        /* Absolute Fallback Manual Override Testing Button Interface Layout */
        #manual-override-btn {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 16px 28px;
            background: #ff5e62;
            color: white;
            font-family: sans-serif;
            font-weight: bold;
            font-size: 14px;
            border: none;
            border-radius: 30px;
            box-shadow: 0 8px 24px rgba(255, 94, 98, 0.4);
            z-index: 9999;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <button id="manual-override-btn">Test Render Engine (Force Visibility)</button>

    <a-scene mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.2/examples/image-tracking/assets/card-example/card.mind; autoStart: true; uiLoading: no; uiError: no;" 
             embedded vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false">
        
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="ar-target-wrapper" mindar-image-target="targetIndex: 0">
            
            <a-cylinder id="test-shape"
                        position="0 0 0" 
                        radius="0.25" 
                        height="0.5" 
                        color="#ff5e62"
                        material="opacity: 1; shader: flat;">
            </a-cylinder>

        </a-entity>

    </a-scene>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const wrapper = document.querySelector('#ar-target-wrapper');
            const shape = document.querySelector('#test-shape');
            const btn = document.getElementById('manual-override-btn');

            // Logging Event Node Hooks
            wrapper.addEventListener("targetFound", () => {
                console.log("🎯 SUCCESS: IMAGE MATCH KEY FOUND!");
                alert("Target image tracked successfully!");
            });

            // MANUAL FALLBACK OVERRIDE CLICK CHANNEL
            btn.addEventListener('click', () => {
                // If tracking code layout locks out visual vectors, we rip the entity 
                // out of MindAR's system matrix loop and force pin it directly into the scene viewport camera views
                console.log("Forcing manual scene layout visualization override injection...");
                
                // Reposition object straight into your viewport perspective
                shape.setAttribute('position', '0 0 -1.5'); 
                
                // Teleport the entity structure out of tracking into the global root scene
                document.querySelector('a-scene').appendChild(shape);
                
                // Drop button visibility
                btn.style.display = 'none';
            });
        });
    </script>

</body>
</html>
