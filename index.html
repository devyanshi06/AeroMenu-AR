<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AeroMenu AR Core Engine</title>

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
        <style>html,
        body {
            margin: 0 !important;
            padding: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            overflow: hidden !important;
            background-color: #000000 !important;
            position: fixed !important;
        }

        /* Target A-Frame wrappers and force full viewport boundaries */
        a-scene,
        .a-canvas,
        .a-video-container,
        video,
        canvas {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            max-width: 100vw !important;
            max-height: 100vh !important;
            object-fit: cover !important;
            z-index: 1 !important;
        }

        .a-enter-vr,
        .a-enter-ar,
        .a-loader-title {
            display: none !important;
        }
    </style>
    </style>
</head>

<body>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: no; uiError: no;" embedded="true"
        vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="pepperoni-target-entity" mindar-image-target="targetIndex: 0">

            <a-box id="placeholder-cube" position="0 0 0" scale="0.5 0.5 0.5"
                material="color: #ff5e62; opacity: 0.85; roughness: 0.3; wireframe: false;">
            </a-box>

        </a-entity>

    </a-scene>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const targetEntity = document.querySelector('#pepperoni-target-entity');

            // Console logger to fire when tracking engine binds successfully
            targetEntity.addEventListener("targetFound", (event) => {
                console.log("🎯 TARGET DETECTED SUCCESSFULLY!");
                alert("Target Found! Look closely for the cube.");
            });

            targetEntity.addEventListener("targetLost", (event) => {
                console.log("❌ Target tracking lost.");
            });
        });
    </script>
</body>

</html>
