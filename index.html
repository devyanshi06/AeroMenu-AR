<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AeroMenu Absolute Debug Suite</title>

    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #000;
        }

        a-scene {
            width: 100vw !important;
            height: 100vh !important;
            position: fixed !important;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* Absolute Fallback Manual Override Testing Button Interface Layout */
        #manual-override-btn {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 16px 28px;
            background: #ff5e62;
            color: white;
            font-family: sans-serif;
            font-weight: bold;
            font-size: 14px;
            border: none;
            border-radius: 30px;
            box-shadow: 0 8px 24px rgba(255, 94, 98, 0.4);
            z-index: 9999;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <button id="manual-override-btn">Test Render Engine (Force Visibility)</button>
    <div id="aeromenu-ui-wrapper">

        <header class="app-header">
            <div class="brand-group">
                <div class="logo-orb"></div>
                <h1>AeroMenu <span class="badge-live">AR LIVE</span></h1>
            </div>
            <button class="info-circle-btn" aria-label="Help">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="16" x2="12" y2="12"></line>
                    <line x1="12" y1="8" x2="12.01" y2="8"></line>
                </svg>
            </button>
        </header>

        <div id="macro-analytics-card" class="macro-card-hidden">
            <div class="card-header">
                <h3>Nutritional Insights</h3>
                <span class="diet-indicator standard-tag">Standard Build</span>
            </div>
            <div class="macro-graphic-container">
                <div class="macro-bar-group">
                    <div class="macro-stat"><span>Protein</span><strong id="macro-protein">32g</strong></div>
                    <div class="macro-progress-track">
                        <div id="bar-protein" class="macro-progress-fill" style="width: 75%;"></div>
                    </div>
                </div>
                <div class="macro-bar-group">
                    <div class="macro-stat"><span>Carbs</span><strong id="macro-carbs">68g</strong></div>
                    <div class="macro-progress-track">
                        <div id="bar-carbs" class="macro-progress-fill" style="width: 60%;"></div>
                    </div>
                </div>
                <div class="macro-bar-group">
                    <div class="macro-stat"><span>Fats</span><strong id="macro-fats">22g</strong></div>
                    <div class="macro-progress-track">
                        <div id="bar-fats" class="macro-progress-fill" style="width: 45%;"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="scan-reticle-container">
            <div class="reticle-corner top-left"></div>
            <div class="reticle-corner top-right"></div>
            <div class="reticle-corner bottom-left"></div>
            <div class="reticle-corner bottom-right"></div>
            <p class="scan-instruction">Align dish inside target framework</p>
        </div>

        <section class="master-dock">
            <div class="dock-handle"></div>

            <div class="dish-meta-row">
                <div class="title-block">
                    <h2 id="current-dish-title">Classic Pepperoni Feast</h2>
                    <p class="dish-description">Artisan sourdough crust, dynamic premium layers.</p>
                </div>
                <div class="price-block">
                    <span class="price-currency">$</span><span id="current-dish-price">16.49</span>
                </div>
            </div>

            <div class="segmented-control-container">
                <div class="sliding-glider"></div>
                <button id="tab-standard" class="control-tab active-tab" onclick="switchDietaryMode('standard')">
                    Standard Option
                </button>
                <button id="tab-vegan" class="control-tab" onclick="switchDietaryMode('vegan')">
                    Plant-Based 🌿
                </button>
            </div>

            <div class="action-footer-row">
                <button class="secondary-action-btn macro-toggle-active" id="macro-toggle-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="20" x2="18" y2="10"></line>
                        <line x1="12" y1="20" x2="12" y2="4"></line>
                        <line x1="6" y1="20" x2="6" y2="14"></line>
                    </svg>
                    <span>Macros</span>
                </button>
                <button class="primary-order-btn" id="confirm-selection-btn">
                    <span>Order with Waiter</span>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                        <polyline points="22 4 12 14.01 9 11.01"></polyline>
                    </svg>
                </button>
            </div>
        </section>

    </div>

    <a-scene
        mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.2/examples/image-tracking/assets/card-example/card.mind; autoStart: true; uiLoading: no; uiError: no;"
        embedded vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="ar-target-wrapper" mindar-image-target="targetIndex: 0">

            <a-cylinder id="test-shape" position="0 0 0" radius="0.25" height="0.5" color="#ff5e62"
                material="opacity: 1; shader: flat;">
            </a-cylinder>

        </a-entity>

    </a-scene>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const wrapper = document.querySelector('#ar-target-wrapper');
            const shape = document.querySelector('#test-shape');
            const btn = document.getElementById('manual-override-btn');

            // Logging Event Node Hooks
            wrapper.addEventListener("targetFound", () => {
                console.log("🎯 SUCCESS: IMAGE MATCH KEY FOUND!");
                alert("Target image tracked successfully!");
            });

            // MANUAL FALLBACK OVERRIDE CLICK CHANNEL
            btn.addEventListener('click', () => {
                // If tracking code layout locks out visual vectors, we rip the entity 
                // out of MindAR's system matrix loop and force pin it directly into the scene viewport camera views
                console.log("Forcing manual scene layout visualization override injection...");

                // Reposition object straight into your viewport perspective
                shape.setAttribute('position', '0 0 -1.5');

                // Teleport the entity structure out of tracking into the global root scene
                document.querySelector('a-scene').appendChild(shape);

                // Drop button visibility
                btn.style.display = 'none';
            });
        });
    </script>

</body>

</html>
