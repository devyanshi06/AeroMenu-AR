<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AeroMenu 100% Guaranteed AR Test</title>
    
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
        html, body {
            margin: 0 !important; padding: 0 !important;
            width: 100vw !important; height: 100vh !important;
            overflow: hidden !important; background-color: #000000 !important;
        }
        a-scene, .a-canvas, video, canvas {
            position: fixed !important; top: 0 !important; left: 0 !important;
            width: 100vw !important; height: 100vh !important;
            object-fit: cover !important; z-index: 1 !important;
        }
        .a-enter-vr, .a-enter-ar { display: none !important; }
    </style>
</head>
<body>

    <a-scene mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/card.mind; autoStart: true; uiLoading: no; uiError: no;" 
             embedded vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false">
        
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="pepperoni-target-entity" mindar-image-target="targetIndex: 0">
            
            <a-box id="placeholder-cube" 
                   position="0 0 0" 
                   scale="0.4 0.4 0.4" 
                   material="color: #ff5e62; opacity: 1; roughness: 0.2;">
            </a-box>

        </a-entity>

    </a-scene>

</body>
</html>
